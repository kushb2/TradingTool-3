name: Telegram Time Test

# GitHub Actions scheduled workflows support a minimum interval of 5 minutes.
# This workflow sends the current UTC and IST time to Telegram so scheduling
# and secrets can be verified quickly after deployment.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-time:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send current time to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          UTC_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          IST_TIME="$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')"
          MESSAGE="GitHub Actions time test
          UTC: ${UTC_TIME}
          IST: ${IST_TIME}"

          curl --fail --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

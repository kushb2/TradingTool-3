name: Daily Indicators Sync

# Runs at 9:15 AM IST (03:45 UTC) on weekdays only.
# IST = UTC+5:30, so 9:15 AM IST = 03:45 UTC.
# This runs after the Kite login reminder and expects the fresh access token
# to already be stored in the kite_tokens table.
on:
  schedule:
    - cron: '45 3 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run IndicatorsSyncJob
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        # Override the default exec main class from cron-job/pom.xml so this
        # workflow runs the indicator sync entrypoint instead of KiteReminderJob.
        run: mvn -pl cron-job -am compile exec:java -Dexec.mainClass=com.tradingtool.cron.IndicatorsSyncJobKt --no-transfer-progress
